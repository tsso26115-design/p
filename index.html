<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Brawl City DX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#7ec850;
touch-action:none;
font-family:sans-serif;
}

#game{
position:absolute;
width:2200px;
height:2200px;
}

#camera{
position:fixed;
left:0;
top:0;
width:100vw;
height:100vh;
overflow:hidden;
}

#player,
.enemy{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
z-index:20;
}

#player{
background:#2196f3;
}

.enemy{
background:#f44336;
}

.road{
position:absolute;
background:#999;
}

.house{
position:absolute;
width:180px;
height:180px;
background:#ffcc80;
border:8px solid #795548;
border-radius:20px;
}

.wall{
position:absolute;
background:#795548;
border-radius:10px;
}

.bush{
position:absolute;
background:#2e7d32;
border-radius:20px;
}

.gem{
position:absolute;
width:40px;
height:40px;
background:#00e5ff;
transform:rotate(45deg);
}

.cube{
position:absolute;
width:40px;
height:40px;
background:#ff9800;
}

.bullet{
position:absolute;
width:14px;
height:14px;
background:yellow;
border-radius:50%;
z-index:30;
}

#leftZone{
position:fixed;
left:0;
top:0;
width:50vw;
height:100vh;
z-index:300;
}

#rightZone{
position:fixed;
right:0;
top:0;
width:50vw;
height:100vh;
z-index:300;
}

#moveBase,
#aimBase{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.2);
border:4px solid rgba(255,255,255,.5);
display:none;
z-index:400;
}

#moveKnob,
#aimKnob{
position:absolute;
left:40px;
top:40px;
width:40px;
height:40px;
border-radius:50%;
background:white;
}

#superBtn{
position:fixed;
right:30px;
bottom:150px;
width:90px;
height:90px;
border:none;
border-radius:50%;
background:#9c27b0;
color:white;
font-size:40px;
z-index:500;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:22px;
font-weight:bold;
text-shadow:2px 2px 5px black;
z-index:600;
}

#aimCanvas{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:350;
}

</style>
</head>

<body>

<div id="ui">
❤️ <span id="hpText">450</span><br>
⚡ <span id="superText">0</span>%<br>
💎 <span id="gemText">0</span>
</div>

<canvas id="aimCanvas"></canvas>

<div id="camera">
<div id="game">

<div class="road"
style="left:0;top:900px;width:2200px;height:120px"></div>

<div class="road"
style="left:1050px;top:0;width:120px;height:2200px"></div>

<div class="house"
style="left:250px;top:250px"></div>

<div class="house"
style="left:1500px;top:350px"></div>

<div class="house"
style="left:1400px;top:1400px"></div>

<div class="wall"
style="left:700px;top:600px;width:350px;height:40px"></div>

<div class="wall"
style="left:1300px;top:1000px;width:300px;height:40px"></div>

<div class="bush"
style="left:400px;top:1300px;width:300px;height:220px"></div>

<div class="bush"
style="left:1600px;top:700px;width:300px;height:220px"></div>

<div id="player"></div>

</div>
</div>

<div id="leftZone"></div>
<div id="rightZone"></div>

<div id="moveBase">
<div id="moveKnob"></div>
</div>

<div id="aimBase">
<div id="aimKnob"></div>
</div>

<button id="superBtn">⚡</button>

<script>

const game=document.getElementById("game");
const player=document.getElementById("player");

const hpText=document.getElementById("hpText");
const superText=document.getElementById("superText");
const gemText=document.getElementById("gemText");

const leftZone=document.getElementById("leftZone");
const rightZone=document.getElementById("rightZone");

const moveBase=document.getElementById("moveBase");
const moveKnob=document.getElementById("moveKnob");

const aimBase=document.getElementById("aimBase");
const aimKnob=document.getElementById("aimKnob");

const aimCanvas=document.getElementById("aimCanvas");
const ctx=aimCanvas.getContext("2d");

aimCanvas.width=innerWidth;
aimCanvas.height=innerHeight;

let px=1000;
let py=1100;

let hp=450;
let superCharge=0;
let gems=0;

let moveX=0;
let moveY=0;

let aimX=0;
let aimY=0;

let moveTouchId=null;
let aimTouchId=null;

let moveActive=false;
let aimActive=false;

const enemies=[];

for(let i=0;i<6;i++){

const e=document.createElement("div");
e.className="enemy";

game.appendChild(e);

enemies.push({
el:e,
x:Math.random()*1800+100,
y:Math.random()*1800+100,
hp:250
});

}
// ===== 左スティック =====

leftZone.addEventListener("touchstart",(e)=>{

if(moveTouchId!==null)return;

moveTouchId=e.changedTouches[0].identifier;

moveActive=true;

const x=e.changedTouches[0].clientX;
const y=e.changedTouches[0].clientY;

moveBase.style.display="block";
moveBase.style.left=(x-60)+"px";
moveBase.style.top=(y-60)+"px";

});

leftZone.addEventListener("touchmove",(e)=>{

if(!moveActive)return;

for(const touch of e.touches){

if(touch.identifier===moveTouchId){

const rect=
moveBase.getBoundingClientRect();

let x=
touch.clientX-(rect.left+60);

let y=
touch.clientY-(rect.top+60);

const d=Math.hypot(x,y);

if(d>45){

x=x/d*45;
y=y/d*45;

}

moveKnob.style.left=(x+40)+"px";
moveKnob.style.top=(y+40)+"px";

moveX=x/45;
moveY=y/45;

break;

}

}

e.preventDefault();

},{passive:false});

leftZone.addEventListener("touchend",(e)=>{

for(const touch of e.changedTouches){

if(touch.identifier===moveTouchId){

moveTouchId=null;

moveActive=false;

moveX=0;
moveY=0;

moveBase.style.display="none";

moveKnob.style.left="40px";
moveKnob.style.top="40px";

}

}

});

// ===== 右エイム =====

rightZone.addEventListener("touchstart",(e)=>{

aimTouchId=
e.changedTouches[0].identifier;

aimActive=true;

const x=e.changedTouches[0].clientX;
const y=e.changedTouches[0].clientY;

aimBase.style.display="block";
aimBase.style.left=(x-60)+"px";
aimBase.style.top=(y-60)+"px";

});

rightZone.addEventListener("touchmove",(e)=>{

if(!aimActive)return;

for(const touch of e.touches){

if(touch.identifier===aimTouchId){

const rect=
aimBase.getBoundingClientRect();

let x=
touch.clientX-(rect.left+60);

let y=
touch.clientY-(rect.top+60);

const d=Math.hypot(x,y);

if(d>45){

x=x/d*45;
y=y/d*45;

}

aimX=x;
aimY=y;

aimKnob.style.left=(x+40)+"px";
aimKnob.style.top=(y+40)+"px";

break;

}

}

e.preventDefault();

},{passive:false});

rightZone.addEventListener("touchend",(e)=>{

for(const touch of e.changedTouches){

if(touch.identifier===aimTouchId){

if(Math.hypot(aimX,aimY)>10){

shootBullet(
aimX,
aimY
);

}

aimTouchId=null;
aimActive=false;

aimBase.style.display="none";

aimKnob.style.left="40px";
aimKnob.style.top="40px";

}

}

});

// ===== 草むら判定 =====

function inBush(x,y){

for(const bush of
document.querySelectorAll(".bush")){

const bx=parseInt(bush.style.left);
const by=parseInt(bush.style.top);

const bw=parseInt(bush.style.width);
const bh=parseInt(bush.style.height);

if(
x>bx &&
x<bx+bw &&
y>by &&
y<by+bh
){
return true;
}

}

return false;

}

// ===== 弾 =====

function shootBullet(dx,dy){

const bullet=
document.createElement("div");

bullet.className="bullet";

let bx=px+30;
let by=py+30;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

game.appendChild(bullet);

const len=Math.hypot(dx,dy);

const vx=dx/len*11;
const vy=dy/len*11;

const timer=setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

for(const wall of
document.querySelectorAll(".wall")){

const wx=parseInt(wall.style.left);
const wy=parseInt(wall.style.top);

const ww=parseInt(wall.style.width);
const wh=parseInt(wall.style.height);

if(
bx>wx &&
bx<wx+ww &&
by>wy &&
by<wy+wh
){

bullet.remove();
clearInterval(timer);
return;

}

}

for(const enemy of enemies){

if(enemy.hp<=0)continue;

if(
Math.hypot(
bx-enemy.x,
by-enemy.y
)<40){

enemy.hp-=40;

superCharge+=5;

bullet.remove();
clearInterval(timer);

if(enemy.hp<=0){

enemy.el.remove();

const cube=
document.createElement("div");

cube.className="cube";

cube.style.left=
enemy.x+"px";

cube.style.top=
enemy.y+"px";

game.appendChild(cube);

}

}

}

if(
bx<0||
by<0||
bx>2200||
by>2200
){

bullet.remove();
clearInterval(timer);

}

},16);

}

// ===== スーパー =====

document
.getElementById("superBtn")
.onclick=()=>{

if(superCharge<100)return;

superCharge=0;

for(let i=-2;i<=2;i++){

const angle=
Math.atan2(aimY,aimX)
+(i*0.2);

shootBullet(
Math.cos(angle)*100,
Math.sin(angle)*100
);

}

};

// ===== メインループ =====

function gameLoop(){

px+=moveX*2.8;
py+=moveY*2.8;

player.style.left=px+"px";
player.style.top=py+"px";

game.style.transform=
`translate(
${-px+innerWidth/2}px,
${-py+innerHeight/2}px
)`;

// 敵AI

for(const enemy of enemies){

if(enemy.hp<=0)continue;

const dx=px-enemy.x;
const dy=py-enemy.y;

const dist=
Math.hypot(dx,dy);

if(
dist>250 &&
!inBush(px,py)
){

enemy.x+=dx/dist*1.2;
enemy.y+=dy/dist*1.2;

}

enemy.el.style.left=
enemy.x+"px";

enemy.el.style.top=
enemy.y+"px";

}

// キューブ取得

document
.querySelectorAll(".cube")
.forEach(c=>{

const x=parseInt(c.style.left);
const y=parseInt(c.style.top);

if(
Math.hypot(
px-x,
py-y
)<50){

c.remove();

hp+=50;

}

});

// UI

hpText.textContent=
Math.floor(hp);

superText.textContent=
Math.floor(superCharge);

gemText.textContent=
gems;

// エイム線

ctx.clearRect(
0,
0,
aimCanvas.width,
aimCanvas.height
);

if(aimActive){

const len=
Math.hypot(
aimX,
aimY
);

if(len>0){

ctx.strokeStyle=
"rgba(255,255,255,0.45)";

ctx.lineWidth=6;

ctx.beginPath();

ctx.moveTo(
innerWidth/2,
innerHeight/2
);

ctx.lineTo(
innerWidth/2+
(aimX/len)*250,

innerHeight/2+
(aimY/len)*250
);

ctx.stroke();

}

}

requestAnimationFrame(
gameLoop
);

}

gameLoop();

window.addEventListener(
"resize",
()=>{

aimCanvas.width=
innerWidth;

aimCanvas.height=
innerHeight;

}
);

</script>
</body>
</html>
