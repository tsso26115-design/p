<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brawl Mini Ultimate</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#7ec850;
touch-action:none;
font-family:sans-serif;
}

#menu{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#7ec850;
z-index:9999;
}

.modeBtn{
width:260px;
height:80px;
font-size:30px;
border:none;
border-radius:15px;
}

#camera{
position:absolute;
left:0;
top:0;
width:2000px;
height:2000px;
}

#game{
display:none;
position:fixed;
left:0;
top:0;
width:100vw;
height:100vh;
overflow:hidden;
}

#player,.enemy{
position:absolute;
width:64px;
height:64px;
border-radius:50%;
}

#player{
background:#2196f3;
}

.enemy{
background:#f44336;
}

.wall{
position:absolute;
background:#795548;
border-radius:10px;
}

.bush{
position:absolute;
background:#2e7d32;
opacity:.8;
border-radius:10px;
}

.bullet{
position:absolute;
width:16px;
height:16px;
border-radius:50%;
background:yellow;
}

.cube{
position:absolute;
width:30px;
height:30px;
background:#00ffff;
}

.gem{
position:absolute;
width:30px;
height:30px;
background:#ff00ff;
transform:rotate(45deg);
}

.hpBar{
position:absolute;
width:70px;
height:8px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.hpFill{
height:100%;
background:#00ff00;
width:100%;
}

#ui{
position:fixed;
left:10px;
top:10px;
z-index:1000;
color:white;
font-size:22px;
font-weight:bold;
text-shadow:2px 2px 5px black;
}

#leftZone{
position:fixed;
left:0;
top:0;
width:50vw;
height:100vh;
z-index:100;
}

#rightZone{
position:fixed;
right:0;
top:0;
width:50vw;
height:100vh;
z-index:100;
}

#moveBase,#aimBase{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.2);
border:4px solid rgba(255,255,255,.5);
display:none;
z-index:500;
}

#moveKnob,#aimKnob{
position:absolute;
left:40px;
top:40px;
width:40px;
height:40px;
background:white;
border-radius:50%;
}

#superBtn{
position:fixed;
right:25px;
bottom:150px;
width:90px;
height:90px;
border:none;
border-radius:50%;
background:#9c27b0;
color:white;
font-size:35px;
z-index:600;
}

#aimCanvas{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:550;
}

</style>
</head>
<body>

<div id="menu">

<h1>Brawl Mini Ultimate</h1>

<button class="modeBtn" onclick="startGame('showdown')">
👑 ショーダウン
</button>

<button class="modeBtn" onclick="startGame('gem')">
💎 ジェムグラブ
</button>

</div>

<div id="ui"></div>

<canvas id="aimCanvas"></canvas>

<div id="game">

<div id="camera">

<div class="wall" style="left:300px;top:300px;width:250px;height:40px"></div>
<div class="wall" style="left:1200px;top:600px;width:250px;height:40px"></div>
<div class="wall" style="left:900px;top:1200px;width:250px;height:40px"></div>

<div class="bush" style="left:500px;top:500px;width:180px;height:180px"></div>
<div class="bush" style="left:1400px;top:800px;width:180px;height:180px"></div>

<div id="player"></div>

<div id="enemy1" class="enemy"></div>
<div id="enemy2" class="enemy"></div>
<div id="enemy3" class="enemy"></div>

</div>

</div>

<div id="leftZone"></div>
<div id="rightZone"></div>

<div id="moveBase"><div id="moveKnob"></div></div>
<div id="aimBase"><div id="aimKnob"></div></div>

<button id="superBtn">⚡</button>

<script>

const MAP_WIDTH=2000;
const MAP_HEIGHT=2000;

const camera=document.getElementById("camera");
const game=document.getElementById("game");

const player=document.getElementById("player");
const ui=document.getElementById("ui");

const aimCanvas=document.getElementById("aimCanvas");
const ctx=aimCanvas.getContext("2d");

aimCanvas.width=window.innerWidth;
aimCanvas.height=window.innerHeight;

let mode="showdown";

function startGame(selected){
mode=selected;
document.getElementById("menu").style.display="none";
game.style.display="block";
}

let px=100;
let py=100;

let moveX=0;
let moveY=0;

let shootDirX=1;
let shootDirY=0;

let aimActive=false;

let hp=300;
let maxHP=300;

let power=0;
let gems=0;
let superCharge=0;

const enemies=[
{el:enemy1,x:1600,y:200,hp:250},
{el:enemy2,x:300,y:1600,hp:250},
{el:enemy3,x:1700,y:1700,hp:250}
];

const leftZone=document.getElementById("leftZone");
const rightZone=document.getElementById("rightZone");

const moveBase=document.getElementById("moveBase");
const moveKnob=document.getElementById("moveKnob");

const aimBase=document.getElementById("aimBase");
const aimKnob=document.getElementById("aimKnob");

const superBtn=document.getElementById("superBtn");

leftZone.addEventListener("touchstart",e=>{

const x=e.touches[0].clientX;
const y=e.touches[0].clientY;

moveBase.style.display="block";
moveBase.style.left=(x-60)+"px";
moveBase.style.top=(y-60)+"px";

});

leftZone.addEventListener("touchmove",e=>{

const rect=moveBase.getBoundingClientRect();

let x=e.touches[0].clientX-(rect.left+60);
let y=e.touches[0].clientY-(rect.top+60);

const d=Math.hypot(x,y);

if(d>45){
x=x/d*45;
y=y/d*45;
}

moveX=x/45;
moveY=y/45;

moveKnob.style.left=(x+40)+"px";
moveKnob.style.top=(y+40)+"px";

e.preventDefault();

},{passive:false});

leftZone.addEventListener("touchend",()=>{

moveX=0;
moveY=0;

moveBase.style.display="none";

moveKnob.style.left="40px";
moveKnob.style.top="40px";

});

rightZone.addEventListener("touchstart",e=>{

aimActive=true;

const x=e.touches[0].clientX;
const y=e.touches[0].clientY;

aimBase.style.display="block";
aimBase.style.left=(x-60)+"px";
aimBase.style.top=(y-60)+"px";

});

rightZone.addEventListener("touchmove",e=>{

const rect=aimBase.getBoundingClientRect();

let x=e.touches[0].clientX-(rect.left+60);
let y=e.touches[0].clientY-(rect.top+60);

const d=Math.hypot(x,y);

if(d>45){
x=x/d*45;
y=y/d*45;
}

shootDirX=x;
shootDirY=y;

aimKnob.style.left=(x+40)+"px";
aimKnob.style.top=(y+40)+"px";

e.preventDefault();

},{passive:false});

rightZone.addEventListener("touchend",()=>{

shootBullet(
shootDirX,
shootDirY,
false
);

aimActive=false;

aimBase.style.display="none";

aimKnob.style.left="40px";
aimKnob.style.top="40px";

});

function shootBullet(dx,dy,enemyShot){

const bullet=document.createElement("div");

bullet.className="bullet";

let bx=enemyShot?enemyShot.x:px+32;
let by=enemyShot?enemyShot.y:py+32;

camera.appendChild(bullet);

const len=Math.hypot(dx,dy);

const vx=dx/len*10;
const vy=dy/len*10;

const timer=setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

document.querySelectorAll(".wall").forEach(w=>{

const r=w.getBoundingClientRect();

const wx=r.left-camera.offsetLeft;
const wy=r.top-camera.offsetTop;

});

if(!enemyShot){

enemies.forEach(enemy=>{

if(enemy.hp<=0)return;

if(Math.hypot(bx-enemy.x,by-enemy.y)<40){

enemy.hp-=35+(power*5);

superCharge+=10;

bullet.remove();
clearInterval(timer);

if(enemy.hp<=0){

const cube=document.createElement("div");

cube.className="cube";

cube.style.left=enemy.x+"px";
cube.style.top=enemy.y+"px";

camera.appendChild(cube);

}

}

});

}else{

if(Math.hypot(bx-px,by-py)<40){

hp-=20;

bullet.remove();
clearInterval(timer);

}

}

if(
bx<0||
by<0||
bx>MAP_WIDTH||
by>MAP_HEIGHT
){

bullet.remove();
clearInterval(timer);

}

},16);

}

superBtn.addEventListener("click",()=>{

if(superCharge<100)return;

superCharge=0;

for(let i=-2;i<=2;i++){

const a=
Math.atan2(
shootDirY,
shootDirX
)+(i*0.2);

shootBullet(
Math.cos(a)*100,
Math.sin(a)*100,
false
);

}

});

setInterval(()=>{

if(mode!=="gem")return;

const gem=document.createElement("div");

gem.className="gem";

gem.style.left=
(200+Math.random()*1600)+"px";

gem.style.top=
(200+Math.random()*1600)+"px";

camera.appendChild(gem);

},5000);

function gameLoop(){

px+=moveX*2.5;
py+=moveY*2.5;

px=Math.max(0,Math.min(MAP_WIDTH-64,px));
py=Math.max(0,Math.min(MAP_HEIGHT-64,py));

player.style.left=px+"px";
player.style.top=py+"px";

camera.style.transform=
`translate(${-px+window.innerWidth/2}px,${-py+window.innerHeight/2}px)`;

enemies.forEach(enemy=>{

if(enemy.hp<=0){

enemy.el.style.display="none";
return;

}

const dx=px-enemy.x;
const dy=py-enemy.y;

const dist=Math.hypot(dx,dy);

if(dist>220){

enemy.x+=dx/dist*1.2;
enemy.y+=dy/dist*1.2;

}

enemy.el.style.left=enemy.x+"px";
enemy.el.style.top=enemy.y+"px";

if(Math.random()<0.01){

shootBullet(
dx,
dy,
enemy
);

}

});

document.querySelectorAll(".cube").forEach(c=>{

const x=parseFloat(c.style.left);
const y=parseFloat(c.style.top);

if(Math.hypot(px-x,py-y)<50){

power++;
maxHP+=50;
hp=maxHP;

c.remove();

}

});

document.querySelectorAll(".gem").forEach(g=>{

const x=parseFloat(g.style.left);
const y=parseFloat(g.style.top);

if(Math.hypot(px-x,py-y)<50){

gems++;
g.remove();

}

});

ctx.clearRect(
0,0,
aimCanvas.width,
aimCanvas.height
);

const len=
Math.hypot(
shootDirX,
shootDirY
);

if(len>0){

ctx.strokeStyle="white";
ctx.lineWidth=5;

ctx.beginPath();

ctx.moveTo(
window.innerWidth/2,
window.innerHeight/2
);

ctx.lineTo(
window.innerWidth/2+(shootDirX/len)*200,
window.innerHeight/2+(shootDirY/len)*200
);

ctx.stroke();

}

ui.innerHTML=
`❤️ ${Math.floor(hp)}
<br>⚡ ${Math.floor(superCharge)}%
<br>💪 ${power}
<br>💎 ${gems}`;

if(mode==="gem"&&gems>=10){

alert("💎 ジェムグラブ勝利！");
location.reload();

}

if(
mode==="showdown" &&
enemies.filter(e=>e.hp>0).length===0
){

alert("👑 ショーダウン勝利！");
location.reload();

}

if(hp<=0){

alert("💀 敗北");
location.reload();

}

requestAnimationFrame(gameLoop);

}

gameLoop();

window.addEventListener("resize",()=>{

aimCanvas.width=window.innerWidth;
aimCanvas.height=window.innerHeight;

});

</script>

</body>
</html>
