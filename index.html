<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Brawl Mini DX 3D</title>

<style>

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
touch-action:none;
background:#000;
font-family:sans-serif;
}

#game{
width:100%;
height:100%;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:24px;
font-weight:bold;
z-index:10;
text-shadow:2px 2px 4px black;
}

#leftZone{
position:fixed;
left:0;
top:0;
width:50vw;
height:100vh;
z-index:20;
}

#rightZone{
position:fixed;
right:0;
top:0;
width:50vw;
height:100vh;
z-index:20;
}

#moveBase,
#aimBase{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.15);
border:4px solid rgba(255,255,255,.5);
display:none;
z-index:50;
}

#moveKnob,
#aimKnob{
position:absolute;
left:40px;
top:40px;
width:40px;
height:40px;
border-radius:50%;
background:white;
}

#superBtn{
position:fixed;
right:25px;
bottom:120px;
width:90px;
height:90px;
border:none;
border-radius:50%;
background:#9c27b0;
color:white;
font-size:35px;
z-index:30;
}

</style>
</head>

<body>

<div id="ui">
❤️ HP: <span id="hp">500</span>
</div>

<div id="game"></div>

<div id="leftZone"></div>
<div id="rightZone"></div>

<div id="moveBase">
<div id="moveKnob"></div>
</div>

<div id="aimBase">
<div id="aimKnob"></div>
</div>

<button id="superBtn">⚡</button>

<script type="module" src="main.js"></script>

</body>
</html>
