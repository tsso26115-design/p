<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brawl Mini DX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#7ec850;
touch-action:none;
font-family:sans-serif;
}

#game{
position:fixed;
left:0;
top:0;
width:100vw;
height:100vh;
overflow:hidden;
}

#player,
#enemy{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
z-index:10;
}

#player{
background:#2196f3;
}

#enemy{
background:#f44336;
}

.wall{
position:absolute;
background:#795548;
border-radius:10px;
}

.bush{
position:absolute;
background:#2e7d32;
border-radius:10px;
opacity:.8;
}

.hpBar{
position:absolute;
width:80px;
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
z-index:20;
}

.hpFill{
height:100%;
width:100%;
background:#00ff00;
}

.damage{
position:absolute;
color:white;
font-weight:bold;
font-size:22px;
pointer-events:none;
z-index:50;
}

.bullet{
position:absolute;
width:16px;
height:16px;
background:yellow;
border-radius:50%;
z-index:15;
}

#moveBase,
#aimBase{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.2);
border:4px solid rgba(255,255,255,.5);
display:none;
z-index:100;
}

#moveKnob,
#aimKnob{
position:absolute;
left:40px;
top:40px;
width:40px;
height:40px;
border-radius:50%;
background:white;
}

#leftZone{
position:fixed;
left:0;
bottom:0;
width:50vw;
height:100vh;
z-index:90;
}

#rightZone{
position:fixed;
right:0;
bottom:0;
width:50vw;
height:100vh;
z-index:90;
}

#superBtn{
position:fixed;
right:30px;
bottom:150px;
width:80px;
height:80px;
border:none;
border-radius:50%;
background:#9c27b0;
color:white;
font-size:30px;
z-index:200;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:22px;
font-weight:bold;
text-shadow:2px 2px 5px black;
z-index:300;
}

#aimCanvas{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:150;
}

</style>
</head>

<body>

<div id="ui">
❤️ HP: <span id="playerHP">300</span>
<br>
⭐ SUPER: <span id="superValue">0</span>%
</div>

<canvas id="aimCanvas"></canvas>

<div id="game">

<div class="wall" style="left:300px;top:200px;width:180px;height:40px"></div>
<div class="wall" style="left:100px;top:450px;width:200px;height:40px"></div>

<div class="bush" style="left:500px;top:350px;width:150px;height:150px"></div>

<div id="player"></div>
<div id="enemy"></div>

<div id="playerBar" class="hpBar">
<div id="playerFill" class="hpFill"></div>
</div>

<div id="enemyBar" class="hpBar">
<div id="enemyFill" class="hpFill"></div>
</div>

</div>

<div id="leftZone"></div>
<div id="rightZone"></div>

<div id="moveBase">
<div id="moveKnob"></div>
</div>

<div id="aimBase">
<div id="aimKnob"></div>
</div>

<button id="superBtn">⚡</button>

<script>

const player=document.getElementById("player");
const enemy=document.getElementById("enemy");

const playerBar=document.getElementById("playerBar");
const enemyBar=document.getElementById("enemyBar");

const playerFill=document.getElementById("playerFill");
const enemyFill=document.getElementById("enemyFill");

const playerHPText=document.getElementById("playerHP");
const superValue=document.getElementById("superValue");

const leftZone=document.getElementById("leftZone");
const rightZone=document.getElementById("rightZone");

const moveBase=document.getElementById("moveBase");
const moveKnob=document.getElementById("moveKnob");

const aimBase=document.getElementById("aimBase");
const aimKnob=document.getElementById("aimKnob");

const superBtn=document.getElementById("superBtn");

const aimCanvas=document.getElementById("aimCanvas");
const ctx=aimCanvas.getContext("2d");

aimCanvas.width=window.innerWidth;
aimCanvas.height=window.innerHeight;

let px=120;
let py=300;

let ex=650;
let ey=250;

let playerHP=300;
let enemyHP=300;

let superCharge=0;

let moveX=0;
let moveY=0;

let aimX=0;
let aimY=0;

let moveActive=false;
let aimActive=false;

function updateUI(){

player.style.left=px+"px";
player.style.top=py+"px";

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

playerBar.style.left=(px-10)+"px";
playerBar.style.top=(py-15)+"px";

enemyBar.style.left=(ex-10)+"px";
enemyBar.style.top=(ey-15)+"px";

playerFill.style.width=
(playerHP/300*100)+"%";

enemyFill.style.width=
(enemyHP/300*100)+"%";

playerHPText.textContent=
Math.max(0,Math.floor(playerHP));

superValue.textContent=
Math.floor(superCharge);

}

updateUI();

leftZone.addEventListener("touchstart",(e)=>{

moveActive=true;

const x=e.touches[0].clientX;
const y=e.touches[0].clientY;

moveBase.style.display="block";

moveBase.style.left=(x-60)+"px";
moveBase.style.top=(y-60)+"px";

});

leftZone.addEventListener("touchmove",(e)=>{

if(!moveActive)return;

const rect=
moveBase.getBoundingClientRect();

let x=
e.touches[0].clientX-
(rect.left+60);

let y=
e.touches[0].clientY-
(rect.top+60);

const d=Math.hypot(x,y);

if(d>45){

x=x/d*45;
y=y/d*45;

}

moveKnob.style.left=
(x+40)+"px";

moveKnob.style.top=
(y+40)+"px";

moveX=x/45;
moveY=y/45;

},{passive:false});

leftZone.addEventListener("touchend",()=>{

moveActive=false;

moveX=0;
moveY=0;

moveBase.style.display="none";

moveKnob.style.left="40px";
moveKnob.style.top="40px";

});

rightZone.addEventListener("touchstart",(e)=>{

aimActive=true;

const x=e.touches[0].clientX;
const y=e.touches[0].clientY;

aimBase.style.display="block";

aimBase.style.left=(x-60)+"px";
aimBase.style.top=(y-60)+"px";

});

rightZone.addEventListener("touchmove",(e)=>{

if(!aimActive)return;

const rect=
aimBase.getBoundingClientRect();

let x=
e.touches[0].clientX-
(rect.left+60);

let y=
e.touches[0].clientY-
(rect.top+60);

const d=Math.hypot(x,y);

if(d>45){

x=x/d*45;
y=y/d*45;

}

aimKnob.style.left=
(x+40)+"px";

aimKnob.style.top=
(y+40)+"px";

aimX=x;
aimY=y;

},{passive:false});

rightZone.addEventListener("touchend",()=>{

if(Math.hypot(aimX,aimY)>10){

shootBullet(
aimX,
aimY,
false
);

}

aimActive=false;

aimX=0;
aimY=0;

aimBase.style.display="none";

aimKnob.style.left="40px";
aimKnob.style.top="40px";

});

function createDamage(x,y,text){

const d=document.createElement("div");

d.className="damage";
d.textContent=text;

d.style.left=x+"px";
d.style.top=y+"px";

document.body.appendChild(d);

let pos=y;

const timer=setInterval(()=>{

pos-=2;

d.style.top=pos+"px";

},16);

setTimeout(()=>{

clearInterval(timer);
d.remove();

},500);

}

function shootBullet(dx,dy,enemyShot=false){

const bullet=document.createElement("div");

bullet.className="bullet";

let bx=enemyShot?ex+30:px+30;
let by=enemyShot?ey+30:py+30;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

document.body.appendChild(bullet);

const len=Math.hypot(dx,dy);

const vx=dx/len*10;
const vy=dy/len*10;

const move=setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

if(enemyShot){

if(Math.hypot(bx-px,by-py)<35){

playerHP-=25;

createDamage(
px,
py,
"-25"
);

bullet.remove();
clearInterval(move);

}
superBtn.addEventListener("click",()=>{

if(superCharge<100)return;

superCharge=0;

const dx=ex-px;
const dy=ey-py;

for(let i=-2;i<=2;i++){

const angle=
Math.atan2(dy,dx)+i*0.25;

shootBullet(
Math.cos(angle)*100,
Math.sin(angle)*100,
false
);

}

});

let enemyCooldown=0;

function gameLoop(){

px+=moveX*5;
py+=moveY*5;

if(px<0)px=0;
if(py<0)py=0;

if(px>window.innerWidth-60)
px=window.innerWidth-60;

if(py>window.innerHeight-60)
py=window.innerHeight-60;

const dx=px-ex;
const dy=py-ey;

const dist=Math.hypot(dx,dy);

if(dist>230){

ex+=dx/dist*1.8;
ey+=dy/dist*1.8;

}

if(dist<170){

ex-=dx/dist*1.2;
ey-=dy/dist*1.2;

}

enemyCooldown++;

if(enemyCooldown>80){

enemyCooldown=0;

shootBullet(
px-ex,
py-ey,
true
);

}

if(enemyHP<=0){

alert("🏆 勝利！");
location.reload();

}

if(playerHP<=0){

alert("💀 敗北...");
location.reload();

}

ctx.clearRect(
0,
0,
aimCanvas.width,
aimCanvas.height
);

if(aimActive){

const len=
Math.hypot(
aimX,
aimY
);

if(len>0){

ctx.strokeStyle="white";
ctx.lineWidth=5;

ctx.beginPath();

ctx.moveTo(
px+30,
py+30
);

ctx.lineTo(
px+30+(aimX/len)*220,
py+30+(aimY/len)*220
);

ctx.stroke();

}

}

updateUI();

requestAnimationFrame(
gameLoop
);

}

gameLoop();

window.addEventListener(
"resize",
()=>{

aimCanvas.width=
window.innerWidth;

aimCanvas.height=
window.innerHeight;

}
);
}else{

if(Math.hypot(bx-ex,by-ey)<35){

enemyHP-=35;

superCharge+=8;

if(superCharge>100)
superCharge=100;

createDamage(
ex,
ey,
"-35"
);

bullet.remove();
clearInterval(move);

}

}

if(
bx<0||
by<0||
bx>window.innerWidth||
by>window.innerHeight
){

bullet.remove();
clearInterval(move);

}

},16);

}

</script>

</body>
</html>
