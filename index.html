<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ブロスタ風ゲーム</title>

<style>
body{
margin:0;
overflow:hidden;
background:#7ec850;
touch-action:none;
}

#ui{
position:fixed;
top:10px;
left:10px;
font-size:28px;
font-weight:bold;
color:white;
text-shadow:2px 2px 5px black;
z-index:100;
}

#player{
position:absolute;
width:50px;
height:50px;
background:#2196f3;
border-radius:50%;
}

.enemy{
position:absolute;
width:50px;
height:50px;
background:#f44336;
border-radius:50%;
}

.bullet{
position:absolute;
width:15px;
height:15px;
background:yellow;
border-radius:50%;
}

#shoot{
position:fixed;
right:30px;
bottom:30px;
width:100px;
height:100px;
border-radius:50%;
border:none;
font-size:40px;
background:#ff9800;
color:white;
}
</style>
</head>
<body>

<div id="ui">
HP: <span id="hp">100</span>
<br>
Score: <span id="score">0</span>
</div>

<div id="player"></div>
<div id="enemy" class="enemy"></div>

<button id="shoot">🔥</button>

<script>

const player=document.getElementById("player");
const enemy=document.getElementById("enemy");
const hpText=document.getElementById("hp");
const scoreText=document.getElementById("score");
const shootBtn=document.getElementById("shoot");

let px=150;
let py=300;

let ex=300;
let ey=150;

let hp=100;
let score=0;

player.style.left=px+"px";
player.style.top=py+"px";

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

document.addEventListener("touchmove",(e)=>{

px=e.touches[0].clientX-25;
py=e.touches[0].clientY-25;

player.style.left=px+"px";
player.style.top=py+"px";

},{passive:false});

function spawnEnemy(){

ex=Math.random()*(window.innerWidth-100)+50;
ey=Math.random()*300+50;

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

}

shootBtn.addEventListener("click",()=>{

const bullet=document.createElement("div");

bullet.className="bullet";

let bx=px+20;
let by=py+20;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

document.body.appendChild(bullet);

const dx=ex-bx;
const dy=ey-by;

const dist=Math.sqrt(dx*dx+dy*dy);

const vx=dx/dist*8;
const vy=dy/dist*8;

const move=setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

const d=Math.sqrt(
(bx-ex)*(bx-ex)+
(by-ey)*(by-ey)
);

if(d<35){

score++;
scoreText.textContent=score;

spawnEnemy();

bullet.remove();
clearInterval(move);

}

if(
bx<0||
by<0||
bx>window.innerWidth||
by>window.innerHeight
){

bullet.remove();
clearInterval(move);

}

},20);

});

setInterval(()=>{

const dx=px-ex;
const dy=py-ey;

const dist=Math.sqrt(dx*dx+dy*dy);

if(dist>1){

ex+=dx/dist*1.5;
ey+=dy/dist*1.5;

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

}

if(dist<50){

hp--;

hpText.textContent=hp;

if(hp<=0){

alert("ゲームオーバー！ スコア:"+score);
location.reload();

}

}

},30);

</script>

</body>
</html>
