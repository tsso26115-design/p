<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brawl Mini Ultimate</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#7ec850;
font-family:sans-serif;
touch-action:none;
}

#menu{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#7ec850;
z-index:9999;
}

.modeBtn{
width:250px;
height:80px;
font-size:30px;
border:none;
border-radius:15px;
}

#game{
display:none;
position:fixed;
left:0;
top:0;
width:100vw;
height:100vh;
overflow:hidden;
}

#player,
.enemy{
position:absolute;
width:64px;
height:64px;
border-radius:50%;
z-index:20;
}

#player{
background:#2196f3;
}

.enemy{
background:#f44336;
}

.wall{
position:absolute;
background:#795548;
border-radius:10px;
z-index:5;
}

.bush{
position:absolute;
background:#2e7d32;
opacity:.8;
border-radius:12px;
z-index:4;
}

.bullet{
position:absolute;
width:16px;
height:16px;
background:yellow;
border-radius:50%;
z-index:25;
}

.gem{
position:absolute;
width:30px;
height:30px;
background:#ff4dd2;
transform:rotate(45deg);
z-index:15;
}

.hpBar{
position:absolute;
width:70px;
height:8px;
background:#333;
border-radius:10px;
overflow:hidden;
z-index:30;
}

.hpFill{
width:100%;
height:100%;
background:#00ff00;
}

#ui{
position:fixed;
top:10px;
left:10px;
font-size:22px;
font-weight:bold;
color:white;
text-shadow:2px 2px 5px black;
z-index:1000;
}

#leftZone{
position:fixed;
left:0;
bottom:0;
width:50vw;
height:100vh;
z-index:100;
}

#rightZone{
position:fixed;
right:0;
bottom:0;
width:50vw;
height:100vh;
z-index:100;
}

#moveBase,
#aimBase{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.2);
border:4px solid rgba(255,255,255,.5);
display:none;
z-index:500;
}

#moveKnob,
#aimKnob{
position:absolute;
left:40px;
top:40px;
width:40px;
height:40px;
background:white;
border-radius:50%;
}

#superBtn{
position:fixed;
right:25px;
bottom:150px;
width:85px;
height:85px;
border:none;
border-radius:50%;
background:#9c27b0;
color:white;
font-size:30px;
z-index:600;
}

#aimCanvas{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:550;
}

</style>
</head>

<body>

<div id="menu">

<h1>Brawl Mini Ultimate</h1>

<button class="modeBtn" onclick="startGame('showdown')">
👑 ショーダウン
</button>

<button class="modeBtn" onclick="startGame('gem')">
💎 ジェムグラブ
</button>

</div>

<div id="ui"></div>

<canvas id="aimCanvas"></canvas>

<div id="game">

<div class="wall" style="left:250px;top:150px;width:220px;height:40px"></div>

<div class="wall" style="left:100px;top:450px;width:250px;height:40px"></div>

<div class="wall" style="left:550px;top:350px;width:200px;height:40px"></div>

<div class="bush" style="left:500px;top:220px;width:140px;height:140px"></div>

<div class="bush" style="left:200px;top:300px;width:120px;height:120px"></div>

<div id="player"></div>

<div id="enemy1" class="enemy"></div>
<div id="enemy2" class="enemy"></div>
<div id="enemy3" class="enemy"></div>

</div>

<div id="leftZone"></div>
<div id="rightZone"></div>

<div id="moveBase">
<div id="moveKnob"></div>
</div>

<div id="aimBase">
<div id="aimKnob"></div>
</div>

<button id="superBtn">⚡</button>

<script>

const player=document.getElementById("player");
const ui=document.getElementById("ui");

const aimCanvas=document.getElementById("aimCanvas");
const ctx=aimCanvas.getContext("2d");

aimCanvas.width=window.innerWidth;
aimCanvas.height=window.innerHeight;

let mode="showdown";

let px=120;
let py=300;

let moveX=0;
let moveY=0;

let aimX=0;
let aimY=0;

let moveActive=false;
let aimActive=false;

let hp=300;
let superCharge=0;

const enemies=[
{el:document.getElementById("enemy1"),x:650,y:200,hp:200},
{el:document.getElementById("enemy2"),x:700,y:450,hp:200},
{el:document.getElementById("enemy3"),x:500,y:550,hp:200}
];

function startGame(selected){

mode=selected;

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

}

const leftZone=document.getElementById("leftZone");
const rightZone=document.getElementById("rightZone");

const moveBase=document.getElementById("moveBase");
const moveKnob=document.getElementById("moveKnob");

const aimBase=document.getElementById("aimBase");
const aimKnob=document.getElementById("aimKnob");

leftZone.addEventListener("touchstart",(e)=>{

moveActive=true;

const x=e.touches[0].clientX;
const y=e.touches[0].clientY;

moveBase.style.display="block";
moveBase.style.left=(x-60)+"px";
moveBase.style.top=(y-60)+"px";

});

leftZone.addEventListener("touchmove",(e)=>{

if(!moveActive)return;

const rect=moveBase.getBoundingClientRect();

let x=e.touches[0].clientX-(rect.left+60);
let y=e.touches[0].clientY-(rect.top+60);

const d=Math.hypot(x,y);

if(d>45){

x=x/d*45;
y=y/d*45;

}

moveKnob.style.left=(x+40)+"px";
moveKnob.style.top=(y+40)+"px";

moveX=x/45;
moveY=y/45;

e.preventDefault();

},{passive:false});

leftZone.addEventListener("touchend",()=>{

moveActive=false;

moveX=0;
moveY=0;

moveBase.style.display="none";

moveKnob.style.left="40px";
moveKnob.style.top="40px";

});

rightZone.addEventListener("touchstart",(e)=>{

aimActive=true;

const x=e.touches[0].clientX;
const y=e.touches[0].clientY;

aimBase.style.display="block";

aimBase.style.left=(x-60)+"px";
aimBase.style.top=(y-60)+"px";

});

rightZone.addEventListener("touchmove",(e)=>{

if(!aimActive)return;

const rect=aimBase.getBoundingClientRect();

let x=e.touches[0].clientX-(rect.left+60);
let y=e.touches[0].clientY-(rect.top+60);

const d=Math.hypot(x,y);

if(d>45){

x=x/d*45;
y=y/d*45;

}

aimKnob.style.left=(x+40)+"px";
aimKnob.style.top=(y+40)+"px";

aimX=x;
aimY=y;

e.preventDefault();

},{passive:false});

rightZone.addEventListener("touchend",()=>{

if(Math.hypot(aimX,aimY)>10){

shootBullet(aimX,aimY);

}

aimActive=false;

aimBase.style.display="none";

aimKnob.style.left="40px";
aimKnob.style.top="40px";

aimX=0;
aimY=0;

});

function shootBullet(dx,dy){

const bullet=document.createElement("div");

bullet.className="bullet";

let bx=px+30;
let by=py+30;

document.body.appendChild(bullet);

const len=Math.hypot(dx,dy);

const vx=dx/len*10;
const vy=dy/len*10;

const timer=setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

enemies.forEach(enemy=>{

if(enemy.hp<=0)return;

if(Math.hypot(bx-enemy.x,by-enemy.y)<35){

enemy.hp-=35;

superCharge+=5;

bullet.remove();
clearInterval(timer);

}

});

if(
bx<0||
by<0||
bx>window.innerWidth||
by>window.innerHeight
){

bullet.remove();
clearInterval(timer);

}

},16);

}

function gameLoop(){

px+=moveX*5;
py+=moveY*5;

player.style.left=px+"px";
player.style.top=py+"px";

enemies.forEach(enemy=>{

if(enemy.hp<=0){

enemy.el.style.display="none";
return;

}

const dx=px-enemy.x;
const dy=py-enemy.y;

const dist=Math.hypot(dx,dy);

if(dist>180){

enemy.x+=dx/dist*1.5;
enemy.y+=dy/dist*1.5;

}

enemy.el.style.left=enemy.x+"px";
enemy.el.style.top=enemy.y+"px";

});

ctx.clearRect(0,0,aimCanvas.width,aimCanvas.height);

if(aimActive){

const len=Math.hypot(aimX,aimY);

if(len>0){

ctx.strokeStyle="white";
ctx.lineWidth=5;

ctx.beginPath();
ctx.moveTo(px+30,py+30);

ctx.lineTo(
px+30+(aimX/len)*250,
py+30+(aimY/len)*250
);

ctx.stroke();

}

}

ui.innerHTML=
"❤️ "+hp+
"<br>⚡ "+Math.floor(superCharge)+"%"+
"<br>🎮 "+mode;

requestAnimationFrame(gameLoop);

}
// ===== 必殺技 =====

const superBtn =
document.getElementById("superBtn");

superBtn.addEventListener("click",()=>{

if(superCharge<100)return;

superCharge=0;

for(let i=-2;i<=2;i++){

const angle=
Math.atan2(aimY||1,aimX||1)
+(i*0.25);

shootBullet(
Math.cos(angle)*100,
Math.sin(angle)*100
);

}

});

// ===== ジェム =====

const gems=[];

function spawnGem(){

if(mode!=="gem")return;

const gem=document.createElement("div");

gem.className="gem";

const gx=
100+Math.random()*
(window.innerWidth-200);

const gy=
100+Math.random()*
(window.innerHeight-200);

gem.style.left=gx+"px";
gem.style.top=gy+"px";

document.getElementById("game")
.appendChild(gem);

gems.push({
el:gem,
x:gx,
y:gy
});

}

setInterval(spawnGem,5000);

let gemCount=0;

// ===== 草むら =====

const bushes=
document.querySelectorAll(".bush");

function updateBush(){

let hidden=false;

bushes.forEach(b=>{

const rect=
b.getBoundingClientRect();

if(
px>rect.left &&
px<rect.right &&
py>rect.top &&
py<rect.bottom
){

hidden=true;

}

});

player.style.opacity=
hidden?0.35:1;

}

// ===== 壁 =====

const walls=
document.querySelectorAll(".wall");

function wallCollision(nx,ny){

for(const wall of walls){

const r=
wall.getBoundingClientRect();

if(
nx+60>r.left &&
nx<r.right &&
ny+60>r.top &&
ny<r.bottom
){

return true;

}

}

return false;

}

// ===== 勝敗判定 =====

function checkWin(){

if(mode==="showdown"){

const alive=
enemies.filter(
e=>e.hp>0
).length;

if(alive===0){

alert("🏆 勝利！");
location.reload();

}

}

if(mode==="gem"){

if(gemCount>=10){

alert("💎 勝利！");
location.reload();

}

}

}

// ===== gameLoop強化 =====

const oldLoop=gameLoop;

gameLoop=function(){

const nx=px+moveX*5;
const ny=py+moveY*5;

if(!wallCollision(nx,ny)){

px=nx;
py=ny;

}

gems.forEach((gem,index)=>{

if(
Math.hypot(
px-gem.x,
py-gem.y
)<50
){

gemCount++;

gem.el.remove();

gems.splice(index,1);

}

});

updateBush();

checkWin();

oldLoop();

};
gameLoop();

</script>

</body>
</html>
