<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Brawl Mini DX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-user-select:none;
user-select:none;
}

body{
overflow:hidden;
background:#6fc14c;
touch-action:none;
font-family:sans-serif;
}

#menu{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:
linear-gradient(
180deg,
#5ccf48,
#2e7d32
);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

#menu h1{
color:white;
font-size:60px;
text-shadow:4px 4px 10px black;
}

#menu img{
width:180px;
height:180px;
margin:20px;
}

#playBtn{
width:240px;
height:80px;
font-size:34px;
border:none;
border-radius:20px;
background:#ffca28;
}

#game{
position:fixed;
left:0;
top:0;
width:3000px;
height:3000px;
}

#camera{
position:fixed;
left:0;
top:0;
width:100vw;
height:100vh;
overflow:hidden;
}

#player,
.enemy{
position:absolute;
width:72px;
height:72px;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
z-index:30;
}

#player{
background:#2196f3;
border-radius:50%;
}

.enemy{
background:#f44336;
border-radius:50%;
}

.wall{
position:absolute;
background:#8d6e63;
border-radius:12px;
}

.bush{
position:absolute;
background:#2e7d32;
border-radius:12px;
}

.water{
position:absolute;
background:#2196f3;
border-radius:20px;
border:6px solid #1565c0;
}

.bullet{
position:absolute;
width:16px;
height:16px;
background:#ffd600;
border-radius:50%;
z-index:25;
}

.hpBar{
position:absolute;
width:80px;
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
z-index:40;
}

.hpFill{
height:100%;
background:#00ff00;
width:100%;
}

.damage{
position:absolute;
font-size:26px;
font-weight:bold;
color:white;
text-shadow:2px 2px 4px black;
z-index:500;
pointer-events:none;
}

#aimCanvas{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:200;
}

#ui{
position:fixed;
left:15px;
top:15px;
color:white;
font-size:22px;
font-weight:bold;
text-shadow:2px 2px 5px black;
z-index:500;
}

#leftZone{
position:fixed;
left:0;
bottom:0;
width:50vw;
height:100vh;
z-index:100;
}

#rightZone{
position:fixed;
right:0;
bottom:0;
width:50vw;
height:100vh;
z-index:100;
}

#moveBase,
#aimBase{
position:fixed;
width:130px;
height:130px;
border-radius:50%;
background:rgba(255,255,255,.18);
border:4px solid rgba(255,255,255,.5);
display:none;
z-index:300;
}

#moveKnob,
#aimKnob{
position:absolute;
left:45px;
top:45px;
width:40px;
height:40px;
background:white;
border-radius:50%;
}

#superBtn{
position:fixed;
right:30px;
bottom:120px;
width:95px;
height:95px;
border-radius:50%;
border:none;
background:#9c27b0;
color:white;
font-size:38px;
z-index:400;
}

#showdown{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:90px;
font-weight:bold;
color:white;
text-shadow:4px 4px 10px black;
display:none;
z-index:9999;
}

#result{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
font-size:90px;
font-weight:bold;
background:rgba(0,0,0,.8);
z-index:99999;
}

</style>
</head>

<body>

<div id="menu">

<h1>BRAWL MINI DX</h1>

<img src="player_front.png">

<button id="playBtn">
▶ PLAY
</button>

</div>

<div id="showdown">
SHOWDOWN
</div>

<div id="result"></div>

<div id="ui">

❤️ <span id="hpText">450</span>

<br>

⚡ <span id="superText">0</span>%

<br>

💪 <span id="killsText">0</span>

<br>

💎 <span id="gemsText">0</span>

</div>

<canvas id="aimCanvas"></canvas>

<div id="camera">

<div id="game">

<div id="player"></div>

</div>

</div>

<div id="leftZone"></div>
<div id="rightZone"></div>

<div id="moveBase">
<div id="moveKnob"></div>
</div>

<div id="aimBase">
<div id="aimKnob"></div>
</div>

<button id="superBtn">
⚡
</button>
<script>

const game=document.getElementById("game");
const player=document.getElementById("player");

const hpText=document.getElementById("hpText");
const superText=document.getElementById("superText");
const killsText=document.getElementById("killsText");
const gemsText=document.getElementById("gemsText");

const moveBase=document.getElementById("moveBase");
const moveKnob=document.getElementById("moveKnob");

const aimBase=document.getElementById("aimBase");
const aimKnob=document.getElementById("aimKnob");

const leftZone=document.getElementById("leftZone");
const rightZone=document.getElementById("rightZone");

const aimCanvas=document.getElementById("aimCanvas");
const ctx=aimCanvas.getContext("2d");

aimCanvas.width=innerWidth;
aimCanvas.height=innerHeight;

let px=1500;
let py=1500;

let hp=450;
let kills=0;
let gems=0;
let superCharge=0;

let moveX=0;
let moveY=0;

let aimX=0;
let aimY=0;

let moveTouchId=null;
let aimTouchId=null;

let moveActive=false;
let aimActive=false;

const enemies=[];

// 敵生成

for(let i=0;i<8;i++){

const enemy=document.createElement("div");

enemy.className="enemy";

game.appendChild(enemy);

enemies.push({

el:enemy,

x:Math.random()*2500+150,
y:Math.random()*2500+150,

hp:250

});

}

// マップ

for(let i=0;i<15;i++){

const wall=document.createElement("div");

wall.className="wall";

wall.style.left=
(Math.random()*2600)+"px";

wall.style.top=
(Math.random()*2600)+"px";

wall.style.width=
(150+Math.random()*150)+"px";

wall.style.height="40px";

game.appendChild(wall);

}

for(let i=0;i<12;i++){

const bush=document.createElement("div");

bush.className="bush";

bush.style.left=
(Math.random()*2500)+"px";

bush.style.top=
(Math.random()*2500)+"px";

bush.style.width="220px";

bush.style.height="180px";

game.appendChild(bush);

}

for(let i=0;i<5;i++){

const water=document.createElement("div");

water.className="water";

water.style.left=
(Math.random()*2500)+"px";

water.style.top=
(Math.random()*2500)+"px";

water.style.width="240px";

water.style.height="180px";

game.appendChild(water);

}

// 左スティック

leftZone.addEventListener("touchstart",(e)=>{

if(moveTouchId!==null)return;

moveTouchId=
e.changedTouches[0].identifier;

moveActive=true;

const x=
e.changedTouches[0].clientX;

const y=
e.changedTouches[0].clientY;

moveBase.style.display="block";

moveBase.style.left=(x-65)+"px";
moveBase.style.top=(y-65)+"px";

});

leftZone.addEventListener("touchmove",(e)=>{

if(!moveActive)return;

for(const touch of e.touches){

if(touch.identifier===moveTouchId){

const rect=
moveBase.getBoundingClientRect();

let x=
touch.clientX-(rect.left+65);

let y=
touch.clientY-(rect.top+65);

const d=Math.hypot(x,y);

if(d>45){

x=x/d*45;
y=y/d*45;

}

moveX=x/45;
moveY=y/45;

moveKnob.style.left=
(x+45)+"px";

moveKnob.style.top=
(y+45)+"px";

}

}

},{passive:false});

leftZone.addEventListener("touchend",(e)=>{

moveTouchId=null;

moveActive=false;

moveX=0;
moveY=0;

moveBase.style.display="none";

});

// 右エイム

rightZone.addEventListener("touchstart",(e)=>{

aimTouchId=
e.changedTouches[0].identifier;

aimActive=true;

const x=
e.changedTouches[0].clientX;

const y=
e.changedTouches[0].clientY;

aimBase.style.display="block";

aimBase.style.left=(x-65)+"px";
aimBase.style.top=(y-65)+"px";

});

rightZone.addEventListener("touchmove",(e)=>{

if(!aimActive)return;

for(const touch of e.touches){

if(touch.identifier===aimTouchId){

const rect=
aimBase.getBoundingClientRect();

let x=
touch.clientX-(rect.left+65);

let y=
touch.clientY-(rect.top+65);

const d=Math.hypot(x,y);

if(d>45){

x=x/d*45;
y=y/d*45;

}

aimX=x;
aimY=y;

aimKnob.style.left=
(x+45)+"px";

aimKnob.style.top=
(y+45)+"px";

}

}

},{passive:false});

rightZone.addEventListener("touchend",(e)=>{

if(Math.hypot(aimX,aimY)>10){

shootBullet(aimX,aimY);

}

aimTouchId=null;

aimActive=false;

aimX=0;
aimY=0;

aimBase.style.display="none";

});

function shootBullet(dx,dy){

const bullet=
document.createElement("div");

bullet.className="bullet";

let bx=px+36;
let by=py+36;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

game.appendChild(bullet);

const len=Math.hypot(dx,dy);

const vx=dx/len*12;
const vy=dy/len*12;

const move=setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

for(const enemy of enemies){

if(enemy.hp<=0)continue;

if(
Math.hypot(
bx-enemy.x,
by-enemy.y
)<40){

enemy.hp-=40;

superCharge+=5;

bullet.remove();

clearInterval(move);

if(enemy.hp<=0){

enemy.el.remove();

kills++;

}

}

}

if(
bx<0||
by<0||
bx>3000||
by>3000
){

bullet.remove();
clearInterval(move);

}

},16);

}
// ===== スーパー技 =====

document
.getElementById("superBtn")
.addEventListener("click",()=>{

if(superCharge<100)return;

superCharge=0;

for(let i=-2;i<=2;i++){

const angle=
Math.atan2(aimY,aimX)
+(i*0.25);

shootBullet(
Math.cos(angle)*100,
Math.sin(angle)*100
);

}

});

// ===== ロビー =====

const menu=
document.getElementById("menu");

const playBtn=
document.getElementById("playBtn");

const showdown=
document.getElementById("showdown");

playBtn.onclick=()=>{

menu.style.display="none";

showdown.style.display="block";

setTimeout(()=>{

showdown.style.display="none";

},2000);

};

// ===== 勝利 =====

function showVictory(){

const result=
document.getElementById("result");

result.style.display="flex";

result.style.color="#ffd700";

result.innerHTML=
"🏆 VICTORY";

}

// ===== 敗北 =====

function showDefeat(){

const result=
document.getElementById("result");

result.style.display="flex";

result.style.color="#ff4444";

result.innerHTML=
"💀 DEFEAT";

}

// ===== 草むら =====

function updateBush(){

let hidden=false;

document
.querySelectorAll(".bush")
.forEach(b=>{

const x=parseInt(b.style.left);
const y=parseInt(b.style.top);

const w=parseInt(b.style.width);
const h=parseInt(b.style.height);

if(
px>x &&
px<x+w &&
py>y &&
py<y+h
){

hidden=true;

}

});

player.style.opacity=
hidden?0.5:1;

}

// ===== キャラ向き =====

function updateDirection(){

if(
Math.abs(moveX)>
Math.abs(moveY)
){

if(moveX>0){

player.style.transform=
"scaleX(1)";

}else if(moveX<0){

player.style.transform=
"scaleX(-1)";

}

}

}

// ===== 敵AI =====

let enemyCooldown=0;

function updateEnemies(){

enemyCooldown++;

for(const enemy of enemies){

if(enemy.hp<=0)continue;

const dx=
px-enemy.x;

const dy=
py-enemy.y;

const dist=
Math.hypot(dx,dy);

if(dist>250){

enemy.x+=dx/dist*1.5;
enemy.y+=dy/dist*1.5;

}

enemy.el.style.left=
enemy.x+"px";

enemy.el.style.top=
enemy.y+"px";

}

if(enemyCooldown>90){

enemyCooldown=0;

for(const enemy of enemies){

if(enemy.hp<=0)
continue;

const bullet=
document.createElement("div");

bullet.className=
"bullet";

let bx=
enemy.x+36;

let by=
enemy.y+36;

game.appendChild(
bullet
);

const dx=
px-enemy.x;

const dy=
py-enemy.y;

const len=
Math.hypot(dx,dy);

const vx=
dx/len*8;

const vy=
dy/len*8;

const timer=
setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=
bx+"px";

bullet.style.top=
by+"px";

if(
Math.hypot(
bx-px,
by-py
)<35
){

hp-=25;

bullet.remove();

clearInterval(
timer
);

if(hp<=0){

showDefeat();

}

}

if(
bx<0||
by<0||
bx>3000||
by>3000
){

bullet.remove();

clearInterval(
timer
);

}

},16);

}

}

}

// ===== カメラ =====

function updateCamera(){

game.style.transform=

`translate(
${-px+innerWidth/2}px,
${-py+innerHeight/2}px
)`;

}

// ===== エイム線 =====

function drawAim(){

ctx.clearRect(
0,
0,
aimCanvas.width,
aimCanvas.height
);

if(!aimActive)return;

const len=
Math.hypot(
aimX,
aimY
);

if(len<1)return;

ctx.strokeStyle=
"rgba(255,255,255,.45)";

ctx.lineWidth=6;

ctx.beginPath();

ctx.moveTo(
innerWidth/2,
innerHeight/2
);

ctx.lineTo(
innerWidth/2+
(aimX/len)*250,

innerHeight/2+
(aimY/len)*250
);

ctx.stroke();

}

// ===== メインループ =====

function gameLoop(){

px+=moveX*3;
py+=moveY*3;

if(px<0)px=0;
if(py<0)py=0;

if(px>3000)px=3000;
if(py>3000)py=3000;

player.style.left=
px+"px";

player.style.top=
py+"px";

updateCamera();

updateBush();

updateDirection();

updateEnemies();

drawAim();

hpText.textContent=
Math.floor(hp);

superText.textContent=
Math.floor(superCharge);

killsText.textContent=
kills;

gemsText.textContent=
gems;

// 全敵撃破

let alive=0;

for(const enemy of enemies){

if(enemy.hp>0)
alive++;

}

if(alive===0){

showVictory();

}

requestAnimationFrame(
gameLoop
);

}

gameLoop();

window.addEventListener(
"resize",
()=>{

aimCanvas.width=
innerWidth;

aimCanvas.height=
innerHeight;

}
);

</script>

</body>
</html>
