<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brawl Mini 1v1</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#7ec850;
touch-action:none;
font-family:sans-serif;
}

#player,#enemy{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
}

#player{
background:#2196f3;
}

#enemy{
background:#f44336;
}

.hpBar{
position:absolute;
width:70px;
height:10px;
background:#444;
border-radius:10px;
overflow:hidden;
}

.hpFill{
width:100%;
height:100%;
background:#00ff00;
}

.bullet{
position:absolute;
width:14px;
height:14px;
border-radius:50%;
background:yellow;
}

#moveBase{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.2);
border:4px solid rgba(255,255,255,.5);
display:none;
z-index:100;
}

#moveKnob{
position:absolute;
width:40px;
height:40px;
left:40px;
top:40px;
border-radius:50%;
background:white;
}

#leftZone{
position:fixed;
left:0;
bottom:0;
width:50vw;
height:100vh;
z-index:50;
}

#shootBtn{
position:fixed;
right:25px;
bottom:25px;
width:110px;
height:110px;
border:none;
border-radius:50%;
font-size:42px;
background:#ff9800;
color:white;
z-index:200;
}

#aimCanvas{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:150;
}

#ui{
position:fixed;
top:10px;
left:10px;
font-size:22px;
font-weight:bold;
color:white;
text-shadow:2px 2px 5px black;
z-index:300;
}
</style>
</head>

<body>

<div id="ui">
❤️ HP: <span id="playerHP">300</span>
</div>

<canvas id="aimCanvas"></canvas>

<div id="player"></div>
<div id="enemy"></div>

<div id="playerBar" class="hpBar">
<div id="playerFill" class="hpFill"></div>
</div>

<div id="enemyBar" class="hpBar">
<div id="enemyFill" class="hpFill"></div>
</div>

<div id="leftZone"></div>

<div id="moveBase">
<div id="moveKnob"></div>
</div>

<button id="shootBtn">🔥</
 const player=document.getElementById("player");
const enemy=document.getElementById("enemy");

const playerBar=document.getElementById("playerBar");
const enemyBar=document.getElementById("enemyBar");

const playerFill=document.getElementById("playerFill");
const enemyFill=document.getElementById("enemyFill");

const leftZone=document.getElementById("leftZone");
const moveBase=document.getElementById("moveBase");
const moveKnob=document.getElementById("moveKnob");

const shootBtn=document.getElementById("shootBtn");

const playerHPText=document.getElementById("playerHP");

const aimCanvas=document.getElementById("aimCanvas");
const ctx=aimCanvas.getContext("2d");

aimCanvas.width=window.innerWidth;
aimCanvas.height=window.innerHeight;

let px=150;
let py=300;

let ex=550;
let ey=250;

let playerHP=300;
let enemyHP=300;

let moveX=0;
let moveY=0;

let stickActive=false;

let aiming=false;
let aimDX=0;
let aimDY=0;

let autoAim=true;

player.style.left=px+"px";
player.style.top=py+"px";

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

function updateBars(){

playerBar.style.left=(px-5)+"px";
playerBar.style.top=(py-15)+"px";

enemyBar.style.left=(ex-5)+"px";
enemyBar.style.top=(ey-15)+"px";

playerFill.style.width=
(playerHP/300*100)+"%";

enemyFill.style.width=
(enemyHP/300*100)+"%";

playerHPText.textContent=
Math.max(0,Math.floor(playerHP));

}

updateBars();

leftZone.addEventListener("touchstart",(e)=>{

stickActive=true;

const x=e.touches[0].clientX;
const y=e.touches[0].clientY;

moveBase.style.display="block";
moveBase.style.left=(x-60)+"px";
moveBase.style.top=(y-60)+"px";

});

leftZone.addEventListener("touchmove",(e)=>{

if(!stickActive)return;

const rect=
moveBase.getBoundingClientRect();

let x=
e.touches[0].clientX-
(rect.left+60);

let y=
e.touches[0].clientY-
(rect.top+60);

const dist=
Math.sqrt(x*x+y*y);

if(dist>40){

x=x/dist*40;
y=y/dist*40;

}

moveKnob.style.left=
(x+40)+"px";

moveKnob.style.top=
(y+40)+"px";

moveX=x/40;
moveY=y/40;

e.preventDefault();

},{passive:false});

leftZone.addEventListener("touchend",()=>{

stickActive=false;

moveBase.style.display="none";

moveKnob.style.left="40px";
moveKnob.style.top="40px";

moveX=0;
moveY=0;

});

function shootBullet(dx,dy,enemyShot=false){

const bullet=
document.createElement("div");

bullet.className="bullet";

let bx=enemyShot?ex+30:px+30;
let by=enemyShot?ey+30:py+30;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

document.body.appendChild(bullet);

const dist=
Math.sqrt(dx*dx+dy*dy);

const vx=dx/dist*9;
const vy=dy/dist*9;

const timer=setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

if(enemyShot){

const hit=Math.hypot(
bx-px,
by-py
);

if(hit<35){

playerHP-=25;

if(playerHP<=0){

alert("敗北...");
location.reload();

}

updateBars();

bullet.remove();
clearInterval(timer);

}

}else{

const hit=Math.hypot(
bx-ex,
by-ey
);

if(hit<35){

enemyHP-=35;

if(enemyHP<=0){

alert("勝利！");
location.reload();

}

updateBars();

bullet.remove();
clearInterval(timer);

}

}

if(
bx<0||
by<0||
bx>window.innerWidth||
by>window.innerHeight
){

bullet.remove();
clearInterval(timer);

}

},16);

}

shootBtn.addEventListener("click",()=>{

if(aiming)return;

const dx=ex-px;
const dy=ey-py;

shootBullet(dx,dy,false);

});

shootBtn.addEventListener("touchstart",(e)=>{

aiming=true;

aimDX=0;
aimDY=0;

});

shootBtn.addEventListener("touchmove",(e)=>{

const rect=
shootBtn.getBoundingClientRect();

aimDX=
e.touches[0].clientX-
(rect.left+55);

aimDY=
e.touches[0].clientY-
(rect.top+55);

});

shootBtn.addEventListener("touchend",()=>{

if(
Math.abs(aimDX)<15 &&
Math.abs(aimDY)<15
){

aiming=false;
return;

}

shootBullet(
aimDX,
aimDY,
false
);

aiming=false;

});

let enemyCooldown=0;

function gameLoop(){

px+=moveX*5;
py+=moveY*5;

if(px<0)px=0;
if(py<0)py=0;

if(px>window.innerWidth-60)
px=window.innerWidth-60;

if(py>window.innerHeight-60)
py=window.innerHeight-60;

const dx=px-ex;
const dy=py-ey;

const dist=Math.hypot(dx,dy);

if(dist>220){

ex+=dx/dist*1.6;
ey+=dy/dist*1.6;

}

if(dist<170){

ex-=dx/dist*0.8;
ey-=dy/dist*0.8;

}

enemyCooldown++;

if(enemyCooldown>90){

enemyCooldown=0;

shootBullet(
px-ex,
py-ey,
true
);

}

player.style.left=px+"px";
player.style.top=py+"px";

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

updateBars();

ctx.clearRect(
0,
0,
aimCanvas.width,
aimCanvas.height
);

if(aiming){

const len=
Math.hypot(
aimDX,
aimDY
);

if(len>0){

ctx.lineWidth=5;

ctx.beginPath();

ctx.moveTo(
px+30,
py+30
);

ctx.lineTo(
px+30+(aimDX/len)*220,
py+30+(aimDY/len)*220
);

ctx.stroke();

}

}

requestAnimationFrame(
gameLoop
);

}

gameLoop();

window.addEventListener(
"resize",
()=>{

aimCanvas.width=
window.innerWidth;

aimCanvas.height=
window.innerHeight;

}
); 
</body>
</html>
