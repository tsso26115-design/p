<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brawl Mini 1v1</title>

<style>

body{
margin:0;
overflow:hidden;
background:#7ec850;
touch-action:none;
font-family:sans-serif;
}

#game{
position:fixed;
left:0;
top:0;
width:100vw;
height:100vh;
}

.player,
.enemy{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
}

.player{
background:#2196f3;
}

.enemy{
background:#f44336;
}

.hpBar{
position:absolute;
width:70px;
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.hpFill{
height:100%;
background:#00ff00;
width:100%;
}

.bullet{
position:absolute;
width:14px;
height:14px;
border-radius:50%;
background:yellow;
}

#leftStick{
position:fixed;
left:0;
bottom:0;
width:50vw;
height:100vh;
}

#moveBase{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.2);
border:4px solid rgba(255,255,255,.5);
display:none;
z-index:100;
}

#moveKnob{
position:absolute;
width:40px;
height:40px;
left:40px;
top:40px;
border-radius:50%;
background:white;
}

#shootBtn{
position:fixed;
right:25px;
bottom:25px;
width:110px;
height:110px;
border:none;
border-radius:50%;
font-size:42px;
background:#ff9800;
color:white;
z-index:200;
}

#aimCanvas{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:150;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:22px;
font-weight:bold;
text-shadow:2px 2px 5px black;
z-index:300;
}

</style>
</head>

<body>

<div id="ui">
❤️ <span id="playerHP">300</span>
</div>

<canvas id="aimCanvas"></canvas>

<div id="game">

<div id="player" class="player"></div>

<div id="enemy" class="enemy"></div>

<div id="playerBar" class="hpBar">
<div id="playerFill" class="hpFill"></div>
</div>

<div id="enemyBar" class="hpBar">
<div id="enemyFill" class="hpFill"></div>
</div>

</div>

<div id="leftStick"></div>

<div id="moveBase">
<div id="moveKnob"></div>
</div>

<button id="shootBtn">🔥</button>

<script>

const player=document.getElementById("player");
const enemy=document.getElementById("enemy");

const playerBar=document.getElementById("playerBar");
const enemyBar=document.getElementById("enemyBar");

const playerFill=document.getElementById("playerFill");
const enemyFill=document.getElementById("enemyFill");

const leftStick=document.getElementById("leftStick");
const moveBase=document.getElementById("moveBase");
const moveKnob=document.getElementById("moveKnob");

const shootBtn=document.getElementById("shootBtn");

const playerHPText=document.getElementById("playerHP");

const aimCanvas=document.getElementById("aimCanvas");
const ctx=aimCanvas.getContext("2d");

aimCanvas.width=window.innerWidth;
aimCanvas.height=window.innerHeight;

let px=150;
let py=300;

let ex=500;
let ey=200;

let playerHP=300;
let enemyHP=300;

let moveX=0;
let moveY=0;

let stickActive=false;

function updateUI(){

player.style.left=px+"px";
player.style.top=py+"px";

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

playerBar.style.left=(px-5)+"px";
playerBar.style.top=(py-18)+"px";

enemyBar.style.left=(ex-5)+"px";
enemyBar.style.top=(ey-18)+"px";

playerFill.style.width=
(playerHP/300*100)+"%";

enemyFill.style.width=
(enemyHP/300*100)+"%";

playerHPText.textContent=
Math.max(0,Math.floor(playerHP));

}

updateUI();

leftStick.addEventListener("touchstart",(e)=>{

stickActive=true;

const x=e.touches[0].clientX;
const y=e.touches[0].clientY;

moveBase.style.display="block";

moveBase.style.left=(x-60)+"px";
moveBase.style.top=(y-60)+"px";

});

leftStick.addEventListener("touchmove",(e)=>{

if(!stickActive)return;

const baseRect=
moveBase.getBoundingClientRect();

let x=
e.touches[0].clientX-
(baseRect.left+60);

let y=
e.touches[0].clientY-
(baseRect.top+60);

const dist=
Math.sqrt(x*x+y*y);

if(dist>40){

x=x/dist*40;
y=y/dist*40;

}

moveKnob.style.left=
(x+40)+"px";

moveKnob.style.top=
(y+40)+"px";

moveX=x/40;
moveY=y/40;

e.preventDefault();

},{passive:false});

leftStick.addEventListener("touchend",()=>{

stickActive=false;

moveBase.style.display="none";

moveKnob.style.left="40px";
moveKnob.style.top="40px";

moveX=0;
moveY=0;

});

setInterval(()=>{

px+=moveX*5;
py+=moveY*5;

if(px<0)px=0;
if(py<0)py=0;

if(px>window.innerWidth-60)
px=window.innerWidth-60;

if(py>window.innerHeight-60)
py=window.innerHeight-60;

const dx=px-ex;
const dy=py-ey;

const dist=Math.sqrt(dx*dx+dy*dy);

if(dist>140){

ex+=dx/dist*1.8;
ey+=dy/dist*1.8;

}

updateUI();

},16);
let aiming=false;
let aimX=0;
let aimY=0;

let enemyShootCooldown=0;
shootBtn.addEventListener("touchstart",(e)=>{

aiming=true;

const rect=shootBtn.getBoundingClientRect();

aimX=rect.left+55;
aimY=rect.top+55;

});

shootBtn.addEventListener("touchmove",(e)=>{

aimX=e.touches[0].clientX;
aimY=e.touches[0].clientY;

});

shootBtn.addEventListener("touchend",()=>{

if(!aiming)return;

aiming=false;

const dx=aimX-(px+30);
const dy=aimY-(py+30);

shootBullet(dx,dy,false);

});
function shootBullet(dx,dy,fromEnemy=false){

const bullet=document.createElement("div");
bullet.className="bullet";

let bx=fromEnemy?ex+30:px+30;
let by=fromEnemy?ey+30:py+30;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

document.body.appendChild(bullet);

const dist=Math.sqrt(dx*dx+dy*dy);

const vx=dx/dist*8;
const vy=dy/dist*8;

const move=setInterval(()=>{

bx+=vx;
by+=vy;

bullet.style.left=bx+"px";
bullet.style.top=by+"px";

if(!fromEnemy){

const hit=Math.sqrt(
(bx-ex)*(bx-ex)+
(by-ey)*(by-ey)
);

if(hit<40){

enemyHP-=40;

if(enemyHP<=0){

alert("勝利！");
location.reload();

}

bullet.remove();
clearInterval(move);

}

}else{

const hit=Math.sqrt(
(bx-px)*(bx-px)+
(by-py)*(by-py)
);

if(hit<40){

playerHP-=20;

if(playerHP<=0){

alert("敗北...");
location.reload();

}

bullet.remove();
clearInterval(move);

}

}

if(
bx<0||
by<0||
bx>window.innerWidth||
by>window.innerHeight
){

bullet.remove();
clearInterval(move);

}

updateUI();
ctx.clearRect(
0,
0,
aimCanvas.width,
aimCanvas.height
);

if(aiming){

ctx.lineWidth=6;

ctx.beginPath();

ctx.moveTo(
px+30,
py+30
);

ctx.lineTo(
aimX,
aimY
);

ctx.stroke();

}

enemyShootCooldown++;

if(enemyShootCooldown>80){

enemyShootCooldown=0;

const dx=px-ex;
const dy=py-ey;

shootBullet(dx,dy,true);

}
},16);

}
</script>

</body>
</html>
